    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
<div class="site-title">
    <img src="../images/logo.png" alt="Logo Lever du Soleil" class="logo">
    <h1><span class="line1">Sunrise</span> <span class="line2">Apartment</span></h1>

</div>
    <nav id="menu">
        <a href="index.html">Home</a>
        <a href="apartement.html">The Apartment</a>
        <a href="booking.html">Booking</a>
        <a href="nearby.html">Nearby</a>

<a href="../fr/contact.html">
    <img src="../images/DRAPEAU/drapeau_francais.png" alt="EN" style="width:18px; height:auto; vertical-align:middle; margin-right:4px;">
    FR
</a>
    </nav>
    <div class="overlay"></div>
    <div class="menu-btn">☰</div>
</header>
<section class="content">
    <h1>Contact the Host</h1>

    <form action="https://formspree.io/f/xdalvpvl" method="POST" class="contact-form">
        <label>Name:</label>
        <input type="text" name="Name" required>

        <label>Email:</label>
        <input type="email" name="Email" required>

        <label>Message:</label>
        <textarea name="Message" rows="6" required></textarea>

        <button type="submit" class="btn">Send</button>
    </form>

    <p class="form-note">You will receive a reply soon.</p>
</section>

<footer>
    <p>© 2026 - Sunrise Apartment</p>
</footer>

<script src="../script.js"></script>

<script>
    const menuBtn = document.querySelector('.menu-btn');
    const nav = document.querySelector('#menu');
    const overlay = document.querySelector('.overlay');

    // Ouvrir / fermer le menu
    menuBtn.addEventListener('click', () => {
        nav.classList.toggle('show');
    });

    // Fermer en cliquant sur l'overlay
    overlay.addEventListener('click', () => {
        nav.classList.remove('show');
    });
</script>


</body>
</html>
