<section class="content">
    <h1>Contacter l'hôte</h1>

    <form action="https://formspree.io/f/mojnznpp" method="POST" class="contact-form">
        <label>Nom :</label>
        <input type="text" name="Nom" required>

        <label>Email :</label>
        <input type="email" name="Email" required>

        <label>Message :</label>
        <textarea name="Message" rows="6" required></textarea>

        <button type="submit" class="btn">Envoyer</button>
    </form>

    <p class="form-note">Vous recevrez une réponse prochainement.</p>
</section>

<footer>
    <p>© 2026 - Location Méditerranée</p>
</footer>

<script src="script.js"></script>
